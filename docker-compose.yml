version: "2.2"

services:
  course-service:
    build: ./course-service
    ports:
      - "8081:8080"
    environment:
      - SERVER_PORT=8080
    
  student-service:
    build: ./student-service
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - COURSE_SERVICE_URL=http://course-service:8080
    depends_on:
      - course-service